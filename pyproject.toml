[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = [
    "ignore::pytest.PytestReturnNotNoneWarning",
]

[tool.coverage.run]
source = ["src", "main"]
omit = [
    "tests/*",
    "backup/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__",
    "pass",
]
